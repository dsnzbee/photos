<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>yeah</title>
  <style>
    :root{
      --bg:#f1ece4;
      --bg2:#e7e0d6;
      --panel:rgba(255,255,255,0.42);
      --text:#2c2621;
      --muted:#6f655d;
      --shadow:0 24px 70px rgba(58,45,34,0.12);
      --shadow-strong:0 30px 90px rgba(58,45,34,0.18);
      --radius:24px;
      --card-radius:22px;
      --max:1280px;
    }

    *{box-sizing:border-box}
    html,body{
      margin:0;
      padding:0;
      min-height:100%;
      overflow-x:hidden;
      scroll-behavior:smooth;
      font-family:Arial, Helvetica, sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 20% 10%, rgba(255,255,255,0.68), transparent 18%),
        radial-gradient(circle at 80% 0%, rgba(188,162,136,0.10), transparent 22%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg2) 100%);
    }

    a{color:inherit;text-decoration:none}

    .topbar{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      z-index:1000;
      padding:16px 22px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      background:linear-gradient(180deg, rgba(242,236,228,0.88), rgba(242,236,228,0.50));
      backdrop-filter:blur(24px) saturate(160%);
      -webkit-backdrop-filter:blur(24px) saturate(160%);
      border-bottom:1px solid rgba(92,76,60,0.08);
      box-shadow:0 8px 24px rgba(58,45,34,0.06);
    }

    .brand{
      font-size:18px;
      font-weight:800;
      letter-spacing:0.3px;
      text-transform:lowercase;
    }

    .jump{
      font-size:13px;
      color:var(--muted);
      padding:9px 13px;
      border-radius:999px;
      background:rgba(255,255,255,0.38);
      border:1px solid rgba(92,76,60,0.08);
      backdrop-filter:blur(16px) saturate(160%);
      -webkit-backdrop-filter:blur(16px) saturate(160%);
      box-shadow:inset 0 1px 0 rgba(255,255,255,0.7);
    }

    .hero{
      position:relative;
      width:100%;
      min-height:92vh;
      margin-top:70px;
      overflow:hidden;
      border-bottom:1px solid rgba(92,76,60,0.08);
      background:
        linear-gradient(180deg, rgba(241,236,228,0.08), rgba(40,34,29,0.18));
    }

    .hero-bg{
      position:absolute;
      inset:-30px;
      background:
        url("hero.JPG")
        center center / cover no-repeat;
      filter:blur(18px) saturate(1.05);
      transform:scale(1.08);
      opacity:1;
    }

    .hero::after{
      content:"";
      position:absolute;
      inset:0;
      background:
        linear-gradient(90deg, rgba(0,0,0,0.42), rgba(0,0,0,0.18)),
        linear-gradient(180deg, rgba(241,236,228,0.08), rgba(92,76,60,0.10));
      z-index:1;
    }

    .hero-content{
      position:relative;
      z-index:2;
      width:min(var(--max), calc(100% - 40px));
      min-height:92vh;
      margin:0 auto;
      display:flex;
      align-items:center;
    }

    .hero-copy{
      max-width:760px;
      padding:0;
      background:transparent;
      border:none;
      box-shadow:none;
      backdrop-filter:none;
      -webkit-backdrop-filter:none;
    }

    .eyebrow{
      font-size:12px;
      letter-spacing:3px;
      text-transform:uppercase;
      color:rgba(255,255,255,0.82);
      margin-bottom:14px;
    }

    h1{
      margin:0;
      max-width:11ch;
      font-size:clamp(48px, 7vw, 96px);
      line-height:0.94;
      color:#ffffff;
      text-shadow:0 12px 28px rgba(0,0,0,0.55);
    }

    .hero p{
      margin:18px 0 0;
      max-width:640px;
      font-size:16px;
      line-height:1.8;
      color:rgba(255,255,255,0.88);
      text-shadow:0 8px 22px rgba(0,0,0,0.45);
    }

    .hero-actions{
      margin-top:26px;
      display:flex;
      gap:12px;
      flex-wrap:wrap;
    }

    .btn{
      display:inline-block;
      padding:12px 18px;
      border-radius:999px;
      border:1px solid rgba(92,76,60,0.10);
      background:rgba(255,255,255,0.55);
      color:var(--text);
      font-weight:700;
      backdrop-filter:blur(18px) saturate(160%);
      -webkit-backdrop-filter:blur(18px) saturate(160%);
      box-shadow:inset 0 1px 0 rgba(255,255,255,0.70), 0 12px 24px rgba(58,45,34,0.08);
    }

    .btn.primary{
      background:#2c2621;
      color:#f7f2eb;
      border-color:rgba(44,38,33,0.10);
    }

    .section{
      width:100%;
      padding:34px 22px 54px;
    }

    .wrap{
      width:min(var(--max), 100%);
      margin:0 auto;
    }

    .section-title{
      margin:0 0 10px;
      font-size:24px;
      letter-spacing:0.2px;
      color:#2c2621;
    }

    .section-note{
      margin:0 0 20px;
      color:var(--muted);
      line-height:1.8;
      max-width:820px;
    }

    .gallery{
      display:grid;
      grid-template-columns:repeat(12, 1fr);
      gap:20px;
      align-items:start;
    }

    .card{
      position:relative;
      overflow:hidden;
      border-radius:var(--card-radius);
      background:var(--panel);
      border:1px solid rgba(92,76,60,0.10);
      box-shadow:var(--shadow);
      backdrop-filter:blur(22px) saturate(170%);
      -webkit-backdrop-filter:blur(22px) saturate(170%);
      cursor:pointer;
      transition:transform 0.28s ease, box-shadow 0.28s ease, border-color 0.28s ease;
    }

    .card:hover{
      transform:translateY(-5px);
      box-shadow:var(--shadow-strong);
      border-color:rgba(92,76,60,0.16);
    }

    .card::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(180deg, rgba(255,255,255,0.10), transparent 26%, rgba(61,45,34,0.12));
      pointer-events:none;
      z-index:1;
    }

    .card img{
      width:100%;
      height:100%;
      display:block;
      object-fit:cover;
    }

    .card.landscape{grid-column:span 8; aspect-ratio:16/9;}
    .card.portrait{grid-column:span 4; aspect-ratio:9/16;}
    .card.square{grid-column:span 4; aspect-ratio:1/1;}
    .card.tallwide{grid-column:span 6; aspect-ratio:4/5;}

    .label{
      position:absolute;
      left:14px;
      bottom:14px;
      z-index:2;
      padding:10px 12px;
      border-radius:12px;
      background:rgba(255,248,241,0.55);
      color:#2c2621;
      border:1px solid rgba(92,76,60,0.10);
      backdrop-filter:blur(18px) saturate(160%);
      -webkit-backdrop-filter:blur(18px) saturate(160%);
      font-size:13px;
      font-weight:800;
      box-shadow:inset 0 1px 0 rgba(255,255,255,0.65);
    }

    .overlay{
      position:fixed;
      inset:0;
      z-index:2000;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
      background:rgba(36,29,23,0.52);
      backdrop-filter:blur(20px) saturate(160%);
      -webkit-backdrop-filter:blur(20px) saturate(160%);
      opacity:0;
      pointer-events:none;
      transition:opacity 0.22s ease;
    }

    .overlay.open{
      opacity:1;
      pointer-events:auto;
    }

    .overlay-frame{
      width:min(1280px, 100%);
      max-height:90vh;
      display:grid;
      grid-template-columns:minmax(0,1fr) 320px;
      border-radius:26px;
      overflow:hidden;
      border:1px solid rgba(92,76,60,0.10);
      background:rgba(255,250,245,0.55);
      box-shadow:0 36px 120px rgba(58,45,34,0.22);
    }

    .overlay-img{
      min-height:72vh;
      background-size:cover;
      background-position:center;
      cursor:pointer;
    }

    .overlay-side{
      padding:20px;
      display:flex;
      flex-direction:column;
      gap:12px;
      background:linear-gradient(180deg, rgba(250,245,238,0.96), rgba(238,231,223,0.96));
      border-left:1px solid rgba(92,76,60,0.08);
    }

    .overlay-side h3{
      margin:0;
      font-size:20px;
      color:#2c2621;
    }

    .overlay-side p{
      margin:0;
      color:var(--muted);
      line-height:1.8;
    }

    .overlay-controls{
      margin-top:auto;
      display:flex;
      gap:8px;
      justify-content:flex-end;
      flex-wrap:wrap;
    }

    .overlay-btn{
      padding:9px 12px;
      border:none;
      border-radius:10px;
      background:rgba(255,255,255,0.65);
      color:#2c2621;
      cursor:pointer;
      border:1px solid rgba(92,76,60,0.08);
      box-shadow:inset 0 1px 0 rgba(255,255,255,0.7);
    }

    @media (max-width: 980px){
      .card.landscape{grid-column:span 12}
      .card.portrait{grid-column:span 6}
      .card.square{grid-column:span 6}
      .card.tallwide{grid-column:span 12}
    }

    @media (max-width: 700px){
      .topbar{padding:14px 16px;}
      .section{padding-left:16px;padding-right:16px;}
      .gallery{
        grid-template-columns:repeat(6, 1fr);
        gap:14px;
      }
      .card.landscape,
      .card.portrait,
      .card.square,
      .card.tallwide{
        grid-column:span 6;
      }
      .overlay-frame{
        grid-template-columns:1fr;
      }
      .overlay-img{
        min-height:54vh;
      }
    }
  </style>
</head>
<body>

  <header class="topbar">
    <div class="brand">p4rachutes</div>
    <a class="jump" href="#gallery">view photos</a>
  </header>

  <section class="hero">
    <div class="hero-bg" aria-hidden="true"></div>
    <div class="hero-content">
      <div class="hero-copy">
        <div class="eyebrow"></div>
        <h1>Indian Illuminance</h1>
        <p>
          Hope is being able to see that there
	is light despite all of the darkness <br>
	-Desmond Tutu 
        </p>
        <div class="hero-actions">
          <a class="btn primary" href="#gallery">open gallery</a>
        </div>
      </div>
    </div>
  </section>

  <section id="gallery" class="section">
    <div class="wrap">
      <h2 class="section-title">Gallery</h2>
      <p class="section-note">
      
      </p>

      <div class="gallery">
        <div class="card landscape" data-title="Photo 1" data-desc="why is she glowing?">
          <img src="photo1.jpg" alt="Photo 1">
          <div class="label">01</div>
        </div>

        <div class="card portrait" data-title="Photo 2" data-desc="i saw sparks">
          <img src="photo2.jpg" alt="Photo 2">
          <div class="label">02</div>
        </div>

        <div class="card landscape" data-title="Photo 3" data-desc="">
          <img src="photo3.jpg" alt="Photo 3">
          <div class="label">03</div>
        </div>

        <div class="card landscape" data-title="Photo 4" data-desc="the couple made it better?">
          <img src="photo4.jpg" alt="Photo 4">
          <div class="label">04</div>
        </div>

        <div class="card portrait" data-title="Photo 5" data-desc="average india">
          <img src="photo5.jpg" alt="Photo 5">
          <div class="label">05</div>
        </div>

        <div class="card landscape" data-title="Photo 6" data-desc="">
          <img src="photo6.jpg" alt="Photo 6">
          <div class="label">06</div>
        </div>

        <div class="card landscape" data-title="Photo 7" data-desc="">
          <img src="photo7.jpg" alt="Photo 7">
          <div class="label">07</div>
        </div>

        <div class="card portrait" data-title="Photo 8" data-desc="i love the moon">
          <img src="photo8.jpg" alt="Photo 8">
          <div class="label">08</div>
        </div>

        <div class="card tallwide" data-title="Photo 9" data-desc="">
          <img src="photo9.jpg" alt="Photo 9">
          <div class="label">09</div>
        </div>

        <div class="card landscape" data-title="Photo 10" data-desc="">
          <img src="photo10.jpg" alt="Photo 10">
          <div class="label">10</div>
        </div>
      </div>
    </div>
  </section>

  <div class="overlay" id="overlay" aria-hidden="true">
    <div class="overlay-frame">
      <div class="overlay-img" id="overlayImg" role="img" aria-label="Selected photograph"></div>
      <aside class="overlay-side">
        <h3 id="overlayTitle">Title</h3>
        <p id="overlayDesc">Description</p>
        <div class="overlay-controls">
          <button class="overlay-btn" id="prevBtn">◀</button>
          <button class="overlay-btn" id="nextBtn">▶</button>
          <button class="overlay-btn" id="closeBtn">✕</button>
        </div>
      </aside>
    </div>
  </div>

  <script>
    const cards = Array.from(document.querySelectorAll('.card'));
    const overlay = document.getElementById('overlay');
    const overlayImg = document.getElementById('overlayImg');
    const overlayTitle = document.getElementById('overlayTitle');
    const overlayDesc = document.getElementById('overlayDesc');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const closeBtn = document.getElementById('closeBtn');

    let current = 0;

    function openCard(index){
      current = index;
      const card = cards[current];
      const img = card.querySelector('img');
      overlayImg.style.backgroundImage = `url('${img.src}')`;
      overlayTitle.textContent = card.dataset.title || img.alt || `Photo ${current + 1}`;
      overlayDesc.textContent = card.dataset.desc || '';
      overlay.classList.add('open');
      overlay.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
    }

    function closeOverlay(){
      overlay.classList.remove('open');
      overlay.setAttribute('aria-hidden', 'true');
      document.body.style.overflow = '';
    }

    function go(step){
      current = (current + step + cards.length) % cards.length;
      openCard(current);
    }

    cards.forEach((card, index) => {
      card.addEventListener('click', () => openCard(index));
    });

    overlay.addEventListener('click', (e) => {
      if (e.target === overlay) closeOverlay();
    });

    overlayImg.addEventListener('click', () => go(1));

    prevBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      go(-1);
    });

    nextBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      go(1);
    });

    closeBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      closeOverlay();
    });

    document.addEventListener('keydown', (e) => {
      if (!overlay.classList.contains('open')) return;
      if (e.key === 'Escape') closeOverlay();
      if (e.key === 'ArrowLeft') go(-1);
      if (e.key === 'ArrowRight') go(1);
    });
  </script>
</body>
</html>
